<script>

window.lastRemainingAmount = null;

function animateAmount(from, to, callback) {
    if (from === null || from === to) {
        callback(to);
        return;
    }

    const duration = 250; // ms (fast & smooth)
    const startTime = performance.now();

    function step(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const current = Math.round(from + (to - from) * progress);
        callback(current);

        if (progress < 1) {
            requestAnimationFrame(step);
        }
    }

    requestAnimationFrame(step);
}

function updateFreeDeliveryMessage(remaining) {
    const msg     = document.getElementById("freeDeliveryMsg");
    if (!msg) return;
    const textEl  = document.getElementById("fdText");
    const fillEl  = document.getElementById("fdFill");
    const truckEl = document.getElementById("fdTruck");
    const freeMin = Number(msg.dataset.min || 799);

    function setBar(pct) {
        const clamped = Math.min(100, Math.max(0, pct));
        if (fillEl)  fillEl.style.width = clamped + "%";
        if (truckEl) truckEl.style.left  = clamped + "%";
    }

    msg.classList.remove("pending", "success");

    if (remaining <= 0) {
        if (lastRemainingAmount !== null && lastRemainingAmount > 0) {
            animateAmount(lastRemainingAmount, 0, (value) => {
                if (textEl) textEl.textContent = value === 0
                    ? "You've got free delivery!"
                    : `Add ₹${value} more for free delivery`;
            });
        } else {
            if (textEl) textEl.textContent = "You've got free delivery!";
        }
        msg.classList.add("success");
        setBar(100);
        lastRemainingAmount = 0;
        return;
    }

    msg.classList.add("pending");
    const pct  = ((freeMin - remaining) / freeMin) * 100;
    const prev = window.lastRemainingAmount;

    if (prev !== null && remaining < prev) {
        const prevPct = ((freeMin - prev) / freeMin) * 100;
        animateAmount(prev, remaining, (value) => {
            if (textEl) textEl.textContent = `Add ₹${value} more for free delivery`;
            setBar(((freeMin - value) / freeMin) * 100);
        });
        setBar(prevPct); // start from prev position immediately
    } else {
        if (textEl) textEl.textContent = `Add ₹${remaining} more for free delivery`;
        setBar(pct);
    }

    window.lastRemainingAmount = remaining;
}


</script>

<script>
document.addEventListener("click", function (e) {


    const btn = e.target.closest("[data-action][data-sku]");


    if (!btn) return;

    // Skip if handled by full cart page's own handler
    if (btn.closest("#cartItemsFullPage")) return;

    e.preventDefault();

    const action = btn.dataset.action;
    const skuId = btn.dataset.sku;

    if (btn.dataset.processing) return;
    btn.dataset.processing = "1";
    btn.disabled = true;

    fetch("{% url 'update_cart' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}",
            "Content-Type": "application/x-www-form-urlencoded",
            "X-Requested-With": "XMLHttpRequest"
        },
        body: `sku_id=${skuId}&action=${action}`
    })
    .then(res => res.json())
    .then(data => {

    if (data.status === "success") {
        updateCartUI(data);
    } else if (data.status === "stock_exceeded") {
        const msg = document.getElementById("stockLimitMsg");
        if (msg) msg.textContent = data.message;
        const toastEl = document.getElementById("stockLimitToast");
        if (toastEl) bootstrap.Toast.getOrCreateInstance(toastEl).show();
    }

})
    .catch(err => {
        console.error("Cart error:", err);
    })
    .finally(() => {
        btn.disabled = false;
        delete btn.dataset.processing;
    });

});
</script>

<script>
function handleMin(val) {
    const maxVal = document.getElementById("maxRange").value;
    if (parseInt(val) > parseInt(maxVal) - 100) {
        val = maxVal - 100;
        document.getElementById("minRange").value = val;
    }
    document.getElementById("minPriceVal").innerText = val;
    document.getElementById("min_price_input").value = val;
}

function handleMax(val) {
    const minVal = document.getElementById("minRange").value;
    if (parseInt(val) < parseInt(minVal) + 100) {
        val = parseInt(minVal) + 100;
        document.getElementById("maxRange").value = val;
    }
    document.getElementById("maxPriceVal").innerText = val;
    document.getElementById("max_price_input").value = val;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>

<script>
const minRange = document.getElementById("minRange");
const maxRange = document.getElementById("maxRange");
const fill = document.getElementById("priceFill");

const minText = document.getElementById("minPriceText");
const maxText = document.getElementById("maxPriceText");

const minInput = document.getElementById("min_price_input");
const maxInput = document.getElementById("max_price_input");


// ✅ Run only if slider exists
if (minRange && maxRange && fill) {

    const min = parseInt(minRange.min);
    const max = parseInt(maxRange.max);

    function updateSlider() {

        let minVal = parseInt(minRange.value);
        let maxVal = parseInt(maxRange.value);

        if (minVal > maxVal) {
            [minVal, maxVal] = [maxVal, minVal];
        }

        const left = ((minVal - min) / (max - min)) * 100;
        const right = ((maxVal - min) / (max - min)) * 100;

        fill.style.left = left + "%";
        fill.style.width = (right - left) + "%";

        if (minText) minText.innerText = minVal;
        if (maxText) maxText.innerText = maxVal;

        if (minInput) minInput.value = minVal;
        if (maxInput) maxInput.value = maxVal;
    }

    minRange.addEventListener("input", updateSlider);
    maxRange.addEventListener("input", updateSlider);

    updateSlider();
}
</script>







<script>
function initSearchBox(inputId, dropdownId) {
    var input    = document.getElementById(inputId);
    var dropdown = document.getElementById(dropdownId);
    if (!input || !dropdown) return;

    /* desktop uses IDs; mobile uses class-based inner divs */
    var resultsBox = dropdown.querySelector('.search-results-box') || document.getElementById('searchResults');
    var viewAllBox = dropdown.querySelector('.search-view-all')    || document.getElementById('searchViewAll');
    if (!resultsBox || !viewAllBox) return;

    var timer = null;

    function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function hl(text, q) {
        var safe = esc(text);
        if (!q) return safe;
        try {
            return safe.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'),
                '<span class=”search-highlight”>$1</span>');
        } catch(e) { return safe; }
    }

    function render(results, query) {
        resultsBox.innerHTML = '';
        viewAllBox.classList.add('d-none');

        if (!results.length) {
            resultsBox.innerHTML = '<div style=”padding:14px 12px;color:#888;font-size:13px;”>No products found for &ldquo;' + esc(query) + '&rdquo;</div>';
            dropdown.classList.remove('d-none');
            return;
        }

        results.forEach(function(item) {
            var d = document.createElement('div');
            d.className = 'search-item';

            if (item.image) {
                var img = document.createElement('img');
                img.src = item.image;
                d.appendChild(img);
            }

            var info = document.createElement('div');
            info.innerHTML =
                '<div class=”search-item-name”>' + hl(item.name, query) + '</div>' +
                '<div class=”search-item-meta”>' + esc(item.brand || '') + ' &bull; &#8377;' + esc(String(item.price || '')) + '</div>';
            d.appendChild(info);

            d.addEventListener('click', function() { window.location.href = item.url; });
            resultsBox.appendChild(d);
        });

        viewAllBox.textContent = 'View all results for “' + query + '”';
        viewAllBox.classList.remove('d-none');
        viewAllBox.onclick = function() { window.location.href = '/search/?q=' + encodeURIComponent(query); };
        dropdown.classList.remove('d-none');
    }

    function hide() { dropdown.classList.add('d-none'); }

    function doSearch(query) {
        fetch('/search-suggest/?q=' + encodeURIComponent(query))
            .then(function(r) { return r.json(); })
            .then(function(d) { render(d.results || [], query); })
            .catch(function(e) { console.error('[Search] error:', e); });
    }

    function onType() {
        var q = input.value.trim();
        clearTimeout(timer);
        if (q.length < 2) { hide(); return; }
        timer = setTimeout(function() { doSearch(q); }, 250);
    }

    input.addEventListener('input', onType);
    input.addEventListener('keyup',  onType);
    input.addEventListener('keydown', function(e) { if (e.key === 'Escape') hide(); });

    document.addEventListener('click', function(e) {
        if (e.target !== input && !dropdown.contains(e.target)) hide();
    });
}

document.addEventListener('DOMContentLoaded', function() {
    initSearchBox('searchInput',       'searchDropdown');
    initSearchBox('mobileSearchInput', 'mobileSearchDropdown');
});
</script>

<script>
let hoverTimers = new Map();
let activeHoverBox = null;

function startHover(box) {

    // Stop previously active box first
    if (activeHoverBox && activeHoverBox !== box) {
        stopHover(activeHoverBox);
    }
    activeHoverBox = box;

    // ✅ Add hover class
    box.classList.add("hover-active");

    const imgs = box.querySelectorAll(".product-card-img");

    if (imgs.length <= 1) return;

    // Clear old timer if exists
    if (hoverTimers.has(box)) {
        clearInterval(hoverTimers.get(box));
    }

    let index = 0;

    // Init first image
    imgs.forEach((img, i) => {
        img.classList.toggle("active", i === 0);
    });

    const timer = setInterval(() => {

        imgs[index].classList.remove("active");

        index = (index + 1) % imgs.length;

        imgs[index].classList.add("active");

    }, 1500); // ⏱️ 2.5s (smooth)

    hoverTimers.set(box, timer);
}


function stopHover(box) {

    if (activeHoverBox === box) activeHoverBox = null;

    // ✅ Remove hover class
    box.classList.remove("hover-active");

    const imgs = box.querySelectorAll(".product-card-img");

    if (hoverTimers.has(box)) {
        clearInterval(hoverTimers.get(box));
        hoverTimers.delete(box);
    }

    // Reset to first image
    imgs.forEach((img, i) => {
        img.classList.toggle("active", i === 0);
    });
}

// Touch support: cycle images on tap-and-hold / scroll-over on mobile
(function () {
    if (!window.matchMedia('(hover: none)').matches) return; // desktop uses mouseenter
    let touchEndTimers = new Map();

    document.addEventListener('touchstart', function (e) {
        const box = e.target.closest('.product-img-box');
        if (!box) return;
        // Cancel any pending stop
        if (touchEndTimers.has(box)) {
            clearTimeout(touchEndTimers.get(box));
            touchEndTimers.delete(box);
        }
        startHover(box);
    }, { passive: true });

    document.addEventListener('touchend', function (e) {
        const box = e.target.closest('.product-img-box');
        if (!box) return;
        // Stop cycling after a short delay so the image stays visible briefly
        const t = setTimeout(function () {
            stopHover(box);
            touchEndTimers.delete(box);
        }, 1200);
        touchEndTimers.set(box, t);
    }, { passive: true });
})();

</script>

<script>
function addWishlistToCart(skuId) {

    fetch("{% url 'add_to_cart' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}",
            "X-Requested-With": "XMLHttpRequest",
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "sku_id=" + skuId
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {

            // Cart count (desktop + mobile)
            const cartCountEl = document.getElementById("cart-count");
            const cartCountMob = document.getElementById("cart-count-mobile");

            if (cartCountEl) {
                cartCountEl.textContent = data.cart_count;
                cartCountEl.style.display = "";
            }
            if (cartCountMob) {
                cartCountMob.textContent = data.cart_count;
                cartCountMob.style.display = data.cart_count > 0 ? "inline-block" : "none";
            }

            // Refresh side cart (if exists)
            if (typeof refreshSideCart === "function") {
                updateCartUI(data);
            }

            // Show toast
            const toastEl = document.getElementById("addToCartToast");

            if (toastEl) {
                new bootstrap.Toast(toastEl).show();
            }
        }
    })
    .catch(err => console.error("Wishlist add error:", err));
}

let selectedSku = null;

// Open modal and load sizes
function openSizeModal(productId) {

    fetch(`/get-product-skus/${productId}/`)
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("sizeOptions");
        container.innerHTML = "";

        selectedSku = null;

        document.getElementById("confirmSizeBtn").disabled = true;

        data.skus.forEach(sku => {

            const btn = document.createElement("div");
            btn.className = "size-pill";
            btn.innerText = sku.size;

            if (sku.stock === 0) {
                btn.classList.add("disabled");
            } else {
                btn.onclick = () => selectSize(btn, sku.id);
            }

            container.appendChild(btn);
        });

        new bootstrap.Modal(
            document.getElementById("sizeModal")
        ).show();
    });
}

// Select size
function selectSize(el, skuId) {

    document.querySelectorAll(".size-pill")
        .forEach(e => e.classList.remove("active"));

    el.classList.add("active");

    selectedSku = skuId;

    document.getElementById("confirmSizeBtn").disabled = false;
}

// Confirm add to cart
document.getElementById("confirmSizeBtn")
?.addEventListener("click", function () {

    if (!selectedSku) return;

    addWishlistToCart(selectedSku);

    bootstrap.Modal
        .getInstance(
            document.getElementById("sizeModal")
        )
        .hide();
});

</script>

<script>

/* ================= TOAST ================= */

function showWishlistToast(status) {

    const toastEl = document.getElementById("wishlistToast");
    const msgEl = document.getElementById("wishlistToastMsg");

    if (!toastEl || !msgEl) return;

    if (status === "added") {
        msgEl.innerHTML = "❤️ Added to wishlist";
    }

    if (status === "removed") {
        msgEl.innerHTML = "💔 Removed from wishlist";
    }

    new bootstrap.Toast(toastEl).show();
}


/* ================= EMPTY CHECK ================= */

function checkEmptyWishlist() {

    const items = document.querySelectorAll(".wishlist-card");

    if (items.length === 0) {

        const main = document.getElementById("wishlistContainer");

        if (!main) return;

        main.innerHTML = `
            <div class="text-center d-flex flex-column
                        justify-content-center
                        align-items-center"
                 style="min-height:60vh;">

                <h5>Your wishlist is empty</h5>

                <a href="/"
                   class="btn btn-outline-dark mt-3">
                    Continue Shopping
                </a>

            </div>
        `;
    }
}


/* ================= MAIN TOGGLE ================= */

function toggleWishlist(productId, btn, color = "") {

    fetch("{% url 'toggle_wishlist' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}",
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "product_id=" + productId + "&color=" + encodeURIComponent(color)
    })

    .then(res => res.json())

    .then(data => {

        /* ================= ICON ================= */

        const icon = btn.querySelector("i");
        const textEl = btn.querySelector(".wishlist-btn-text");

        if (data.status === "added") {
            btn.classList.add("wish-active");
            if (icon) icon.classList.replace("bi-heart", "bi-heart-fill");
            if (textEl) textEl.innerHTML = "Saved";
        } else {
            btn.classList.remove("wish-active");
            if (icon) icon.classList.replace("bi-heart-fill", "bi-heart");
            if (textEl) textEl.innerHTML = btn.dataset.inactiveLabel || "Save to Wishlist";
        }

        /* ================= COLOR KEY CALLBACK ================= */
        if (typeof window.onWishlistToggle === "function") {
            window.onWishlistToggle(productId, data.status, color);
        }


        /* ================= REMOVE CARD ================= */

        if (data.status === "removed") {

            const card = btn.closest(".wishlist-card");

            if (card) {
                card.remove();
            }
        }


        /* ================= EMPTY STATE ================= */

        const cards =
            document.querySelectorAll(".wishlist-card");

        const emptyBox =
            document.getElementById("emptyWishlist");

        const list =
            document.getElementById("wishlistList");


        if (cards.length === 0) {

            if (list) {
                list.style.display = "none";
            }

            if (emptyBox) {
                emptyBox.classList.remove("d-none");
                emptyBox.classList.add("d-flex");
            }
        }


        /* ================= BADGE ================= */

        // Desktop badge
        const badge = document.querySelector(".wishlist-badge");
        if (badge) {
            if (data.count > 0) {
                badge.textContent = data.count;
                badge.style.display = "";
            } else {
                badge.style.display = "none";
            }
        }

        // Mobile badge
        const mobileBadge = document.querySelector(".wishlist-badge-mobile");
        if (mobileBadge) {
            if (data.count > 0) {
                mobileBadge.innerText = data.count;
                mobileBadge.style.display = "";
            } else {
                mobileBadge.style.display = "none";
            }
        }


        /* ================= TOAST ================= */

        showWishlistToast(data.status);

    })

    .catch(err => console.error("Wishlist error:", err));
}


</script>

function viewBag() {
    const offcanvas = bootstrap.Offcanvas.getInstance(document.getElementById('sideCart'));
    if (offcanvas) offcanvas.hide();
    window.location.href = '/cart/';
}

function getCSRFToken() {

    let cookieValue = null;
    const cookies = document.cookie.split(";");

    for (let cookie of cookies) {
        cookie = cookie.trim();

        if (cookie.startsWith("csrftoken=")) {
            cookieValue = cookie.substring(10);
            break;
        }
    }
    return cookieValue;
}

<script>
function updateCartUI(data) {

    if (data.status !== "success") return;

    /* ================= SIDE CART ITEMS ================= */

    const cartBox = document.getElementById("cart-items");

    if (cartBox) {
        if (data.cart_count > 0 && data.cart_html) {
            cartBox.innerHTML = data.cart_html;
        } else {
            cartBox.innerHTML = "";
        }
    }

    /* ================= EMPTY STATE ================= */

    const emptyBox = document.getElementById("empty-cart");
    const cartItemsEl = document.getElementById("cart-items");
    const footer = document.getElementById("cart-footer");

    if (data.cart_count > 0) {
        if (emptyBox) emptyBox.classList.add("d-none");
        if (cartItemsEl) cartItemsEl.classList.remove("d-none");
        if (footer) footer.style.display = "block";
    } else {
        if (emptyBox) emptyBox.classList.remove("d-none");
        if (cartItemsEl) cartItemsEl.classList.add("d-none");
        if (footer) footer.style.display = "none";
    }

    /* ================= SIDE CART FOOTER ================= */

    const footerBox = document.getElementById("cartFooterContainer");


    if (footerBox && data.cart_footer) {
        footerBox.innerHTML = data.cart_footer;
        if (typeof updateFreeDeliveryMessage === "function") {
            updateFreeDeliveryMessage(data.free_delivery_remaining);
        }
    }

    /* ================= CART PAGE SUMMARY ================= */

    const cartSummary = document.getElementById("cartSummaryContainer");

    if (cartSummary && data.cart_summary) {
        cartSummary.innerHTML = data.cart_summary;
    }

    /* ================= CART PAGE ITEMS ================= */

    const fullCartWrapper = document.getElementById("cartItemsFullPage");

    // If cart is now empty and we are on the cart page, trigger empty state
    if (fullCartWrapper && data.cart_count === 0) {
        if (typeof showEmptyState === "function") showEmptyState();
        // Update badge before returning
        const cartCountEarly = document.getElementById("cart-count");
        if (cartCountEarly) cartCountEarly.style.display = "none";
        return;
    }

    if (fullCartWrapper && data.cart_html) {

        const temp = document.createElement("div");
        temp.innerHTML = data.cart_html;

        // Get current cart page card SKU ids
        const existingCards = {};
        fullCartWrapper.querySelectorAll("[id^='cart-full-item-']").forEach(function(card) {
            const skuId = card.id.replace("cart-full-item-", "");
            existingCards[skuId] = card;
        });

        const updatedIds = [];

        temp.querySelectorAll("[id^='item-']").forEach(function(item) {
            const skuId = item.id.replace("item-", "");
            updatedIds.push(skuId);

            if (existingCards[skuId]) {

                // Item exists — just update qty and price
                const qtyEl = temp.querySelector("#qty-" + skuId);
                const fullQtyEl = document.getElementById("qty-full-" + skuId);
                if (qtyEl && fullQtyEl) {
                    fullQtyEl.innerText = qtyEl.innerText.trim();
                }

                const priceEl = temp.querySelector("#price-" + skuId);
                const fullPriceEl = document.getElementById("price-full-" + skuId);
                if (priceEl && fullPriceEl) {
                    fullPriceEl.innerText = priceEl.innerText.trim();
                }

            } else {

                // New SKU not on page yet (size change) — fetch fresh cart page
                fetch(window.location.href, {
                    headers: { "X-Requested-With": "XMLHttpRequest" }
                })
                .then(function(res) { return res.text(); })
                .then(function(html) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, "text/html");
                    const newWrapper = doc.getElementById("cartItemsFullPage");
                    if (newWrapper && fullCartWrapper) {
                        fullCartWrapper.innerHTML = newWrapper.innerHTML;
                    }
                });
            }
        });

        // Remove items deleted from cart
        Object.keys(existingCards).forEach(function(skuId) {
            if (!updatedIds.includes(skuId)) {
                existingCards[skuId].remove();
            }
        });

    }

    /* ================= CHECKOUT ITEMS ================= */

    const checkoutBox = document.getElementById("checkoutItemsContainer");

    if (checkoutBox && data.checkout_html) {
        checkoutBox.innerHTML = data.checkout_html;
    }

    /* ================= CHECKOUT TOTALS ================= */

    const checkoutTotals = document.getElementById("checkoutTotals");

    if (checkoutTotals) {

        const delivery = data.delivery_charge;
        const total = data.cart_total;
        const remaining = data.free_delivery_remaining;

        const deliveryHtml = delivery === 0
            ? '<span class="text-success fw-semibold">FREE</span>'
            : '&#8377;' + delivery;

        const freeDeliveryHtml = remaining > 0
            ? '<div class="free-delivery-checkout pending">Add &#8377;' + remaining + ' more to get free delivery</div>'
            : '<div class="free-delivery-checkout success">&#127881; Free delivery unlocked</div>';

        checkoutTotals.innerHTML =
            '<div class="d-flex justify-content-between">' +
                '<span class="text-muted">Subtotal</span>' +
                '<span>&#8377;' + data.cart_subtotal + '</span>' +
            '</div>' +
            '<div class="d-flex justify-content-between">' +
                '<span class="text-muted">Delivery</span>' +
                '<span>' + deliveryHtml + '</span>' +
            '</div>' +
            freeDeliveryHtml +
            '<hr>' +
            '<div class="d-flex justify-content-between fw-bold fs-5">' +
                '<span>Amount Payable</span>' +
                '<span>&#8377;' + total + '</span>' +
            '</div>';

        const payBtn = document.getElementById("pay-btn");
        if (payBtn) {
            payBtn.innerText = "Pay \u20B9" + total;
        }
    }

    /* ================= BADGE ================= */

    const cartCount    = document.getElementById("cart-count");
    const cartCountMob = document.getElementById("cart-count-mobile");

    if (cartCount) {
        if (data.cart_count > 0) {
            cartCount.innerText = data.cart_count;
            cartCount.style.display = "";
        } else {
            cartCount.style.display = "none";
        }
    }
    if (cartCountMob) {
        if (data.cart_count > 0) {
            cartCountMob.innerText = data.cart_count;
            cartCountMob.style.display = "inline-block";
        } else {
            cartCountMob.style.display = "none";
        }
    }

}


/* ================= BFCACHE / BACK-NAV REFRESH ================= */
/* Refresh badge counts when browser restores page (bfcache or history cache) */

window.addEventListener("pageshow", function(e) {
    // e.persisted = true  → bfcache restore
    // navigation.type=2   → normal back/forward (no bfcache)
    const isBackNav = e.persisted ||
        (typeof performance !== "undefined" &&
         performance.navigation && performance.navigation.type === 2);
    if (!isBackNav) return;
    fetch("{% url 'get_counts' %}")
        .then(r => r.json())
        .then(data => {
            const cc  = document.getElementById("cart-count");
            const ccm = document.getElementById("cart-count-mobile");
            const wb  = document.querySelector(".wishlist-badge");
            const wbm = document.querySelector(".wishlist-badge-mobile");

            if (cc)  { cc.textContent  = data.cart_count;     cc.style.display  = data.cart_count     > 0 ? "" : "none"; }
            if (ccm) { ccm.textContent = data.cart_count;     ccm.style.display = data.cart_count     > 0 ? "inline-block" : "none"; }
            if (wb)  { wb.textContent  = data.wishlist_count; wb.style.display  = data.wishlist_count > 0 ? "" : "none"; }
            if (wbm) { wbm.textContent = data.wishlist_count; wbm.style.display = data.wishlist_count > 0 ? "inline-block" : "none"; }
        })
        .catch(() => {});
});

</script>







<script>
function subscribeNewsletter(e) {
    e.preventDefault();
    var email = document.getElementById('newsletter-email').value;
    var csrf  = document.querySelector('#newsletter-form [name=csrfmiddlewaretoken]').value;
    var msg   = document.getElementById('newsletter-msg');
    fetch('/newsletter/subscribe/', {
        method: 'POST',
        headers: {'X-CSRFToken': csrf, 'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'email=' + encodeURIComponent(email)
    }).then(function(r){ return r.json(); }).then(function(d) {
        msg.textContent = d.message;
        msg.style.color = d.status === 'ok' ? '#16a34a' : '#6b7280';
        if (d.status === 'ok') document.getElementById('newsletter-email').value = '';
    }).catch(function() {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.style.color = '#c62828';
    });
}

function checkPin() {
    var pin = (document.getElementById('pin-input')?.value || '').trim();
    var el = document.getElementById('pin-result');
    if (!el) return;
    if (!pin) { el.textContent = 'Enter a pincode.'; el.style.color = '#c62828'; return; }
    var csrf = document.querySelector('[name=csrfmiddlewaretoken]')?.value
               || document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
    fetch('/check-pincode/', {
        method: 'POST',
        headers: { 'X-CSRFToken': csrf, 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'pincode=' + encodeURIComponent(pin)
    })
    .then(r => r.json())
    .then(d => {
        el.textContent = d.message;
        el.style.color = d.available ? '#2e7d32' : '#c62828';
    });
}

var _reviewRating = 0;
function setRating(val) {
    _reviewRating = val;
    document.querySelectorAll('#star-selector span').forEach(function(s, i) {
        s.style.color = i < val ? '#f5a623' : '#ddd';
    });
}

function submitReview(productId) {
    var errEl = document.getElementById('review-error');
    if (_reviewRating === 0) {
        if (errEl) { errEl.textContent = 'Please select a star rating.'; errEl.style.display = 'block'; }
        return;
    }
    var csrf = document.querySelector('[name=csrfmiddlewaretoken]')?.value
               || document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
    var title = document.getElementById('review-title')?.value || '';
    var comment = document.getElementById('review-comment')?.value || '';
    fetch('/product/' + productId + '/review/', {
        method: 'POST',
        headers: { 'X-CSRFToken': csrf, 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'rating=' + _reviewRating + '&title=' + encodeURIComponent(title) + '&comment=' + encodeURIComponent(comment)
    })
    .then(r => r.json())
    .then(d => {
        if (d.status === 'ok') {
            var form = document.querySelector('#reviews .product-info-card, [onclick^="submitReview"]')?.closest('div[style*="background:#fff"]');
            // Hide the review form
            var reviewForms = document.querySelectorAll('#reviews > div');
            reviewForms.forEach(function(f) { if (f.querySelector('[onclick^="submitReview"]')) f.style.display = 'none'; });
            // Prepend new review to list
            var list = document.getElementById('reviews-list');
            if (!list) {
                var section = document.getElementById('reviews');
                list = document.createElement('div');
                list.id = 'reviews-list';
                section.appendChild(list);
            }
            var stars = '';
            for (var i = 1; i <= 5; i++) stars += i <= d.rating ? '★' : '☆';
            var div = document.createElement('div');
            div.style.cssText = 'background:#fff;border:1px solid #ececec;border-radius:14px;padding:22px;margin-bottom:14px;';
            div.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'
                + '<div><span style="color:#f5a623;font-size:1rem;letter-spacing:1px;">' + stars + '</span>'
                + (d.title ? '<span style="font-size:0.9rem;font-weight:600;color:#111;margin-left:8px;">' + d.title + '</span>' : '') + '</div>'
                + '<span style="font-size:0.75rem;color:#bbb;">' + d.created_at + '</span></div>'
                + (d.comment ? '<p style="font-size:0.85rem;color:#555;margin:0 0 8px;line-height:1.6;">' + d.comment + '</p>' : '')
                + '<div style="font-size:0.75rem;color:#aaa;">— ' + d.reviewer_name + '</div>';
            list.prepend(div);
        } else {
            if (errEl) { errEl.textContent = d.message || 'Could not submit review.'; errEl.style.display = 'block'; }
        }
    });
}
</script>

</body>
