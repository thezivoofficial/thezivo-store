<!-- Add to Cart Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1045;">
    <div id="addToCartToast"
         class="toast text-bg-dark border-0"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">
        <div class="toast-body">
            <div class="d-flex justify-content-between align-items-center">
                <span>✅ Item added to bag</span>
                <a href="{% url 'view_cart' %}"
                   class="btn btn-sm btn-outline-light ms-3">
                    View Bag
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Wishlist Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1045;">
    <div id="wishlistToast"
         class="toast text-bg-dark border-0"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">
        <div class="toast-body">
            <span id="wishlistToastMsg"></span>
        </div>
    </div>
</div>

<!-- Stock Limit Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1100;">
    <div id="stockLimitToast"
         class="toast border-0"
         role="alert"
         style="background:#fff3cd; color:#856404;"
         data-bs-delay="3000">
        <div class="toast-body d-flex align-items-center gap-2"
             style="font-weight:600; font-size:0.85rem;">
            <span style="font-size:1.1rem;">⚠️</span>
            <span id="stockLimitMsg">Maximum available quantity reached.</span>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const sideCart = document.getElementById("sideCart");
    const toastEl = document.getElementById("addToCartToast");

    if (!sideCart || !toastEl) return;

    sideCart.addEventListener("shown.bs.offcanvas", function () {
        // hide toast when side cart opens
        const toast = bootstrap.Toast.getOrCreateInstance(toastEl);
        toast.hide();
    });

    // ✅ Free delivery bar on initial load
    const freeMsg = document.getElementById("freeDeliveryMsg");
    if (!freeMsg) return;
    const remaining = Number(freeMsg.dataset.remaining);
    const freeMin   = Number(freeMsg.dataset.min || 799);
    const fillEl    = document.getElementById("fdFill");
    const truckEl   = document.getElementById("fdTruck");
    const textEl    = document.getElementById("fdText");
    const pct = remaining > 0
        ? Math.min(100, Math.max(0, ((freeMin - remaining) / freeMin) * 100))
        : 100;
    // slight delay so the CSS transition plays on open
    setTimeout(() => {
        if (fillEl)  fillEl.style.width = pct + "%";
        if (truckEl) truckEl.style.left  = pct + "%";
    }, 120);
    if (textEl) textEl.textContent = remaining > 0
        ? `Add ₹${remaining} more for free delivery`
        : "You've got free delivery!";
    window.lastRemainingAmount = remaining;
});
</script>
