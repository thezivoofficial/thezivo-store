        /* =========================================================
        MYNTRA STYLE PRICE SLIDER
        Used in filters (PRICE section) for dual range slider
        ========================================================= */

        .price-range {
            position: relative;
            height: 2px;   /* Visual height of the slider track */
            margin-top: 8px;
        }

        /* Base inactive track (full range background) */
        .price-track {
            position: absolute;
            top: -2px;
            width: 100%;
            height: 2px;
            background: #e0e0e0;
            border-radius: 3px;
        }

        /* Active selected price range (filled portion) */
        .price-fill {
            position: absolute;
            top: -2px;
            height: 2px;
            background: #ff3f6c;
            border-radius: 3px;
            z-index: 1;
            transition: left 0.25s ease, width 0.25s ease;
        }

        /* Range input overlay (both min & max sliders) */
        .price-range input[type=range] {
            position: absolute;
            top: -15px;
            width: 100%;
            pointer-events: none;
            background: none;
            -webkit-appearance: none;
            z-index: 2;
        }

        /* WebKit slider thumb (Chrome / Edge / Safari) */
        .price-range input[type=range]::-webkit-slider-thumb {
            pointer-events: auto;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid #ff3f6c;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: 8px;
        }

        /* Firefox slider thumb */
        .price-range input[type=range]::-moz-range-thumb {
            pointer-events: auto;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #2fb5a9;
            cursor: pointer;
        }

        /* Layering order for overlapping sliders */
        #minRange { z-index: 4; }
        #maxRange { z-index: 5; }

        /* Mobile slider (separate IDs to avoid desktop conflict) */
        #minRange-mob { z-index: 4; }
        #maxRange-mob { z-index: 5; }

    /* =========================================================
    GLOBAL RESET
    Removes default browser spacing
    ========================================================= */

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
    }

        /* =========================================================
        BASE BODY STYLING
        Global typography & navbar offset
        ========================================================= */

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fffdfdff; /* cream background */
            padding-top: 76px; /* adjust if navbar height changes */
        }

    /* =========================================================
    CART QUANTITY CONTROLS (Side Cart)
    ========================================================= */

    .qty-pill {
        display: flex;
        align-items: center;
        border: 1px solid #d8d6d6ff;
        border-radius: 5px;
        height: 23px;
        overflow: hidden;
    }

    .qty-pill .qty-btn {
        width: 20px;
        height: 18px;
        border: none;
        background: #fff;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        border-radius: 6px;
        padding: 0;
        text-align: center;
    }

    /* Hover feedback for quantity buttons */
    .qty-pill .qty-btn:hover {
        background: #bf5e5eff;
    }

    /* Quantity number text */
    .qty-count {
        min-width: 28px;
        text-align: center;
        font-size: 12px;
        font-weight: 400;
    }

    /* =========================================================
    SIZE PILL (Cart / Summary Display)
    ========================================================= */

    select.size-pill {
        height: 23px;
        padding: 0 10px;
        border-radius: 5px;
        border: 1px solid #292727ff;
        font-size: 14px;
        background-color: #fff;
        cursor: pointer;
        font-weight: 550;
    }

    /* Remove default bootstrap focus ring */
    select.size-pill:focus {
        box-shadow: none;
        border-color: #1c1b1bff;
    }

    /* =========================================================
    CART DELETE ICON
    ========================================================= */

    .cart-delete-icon {
    font-size: 18px;
    color: #333;
    cursor: pointer;
    }

    .cart-delete-icon:hover {
        color: #e41010ff;
        transform: scale(1.1);
    }

    /* =========================================================
    SIDE CART (OFFCANVAS)
    ========================================================= */

    /* Center empty cart message */
    #sideCart #empty-cart {
        height: 100% !important;
    }

    /* Ensure cart stays above content */
    #sideCart {
        z-index: 1060 !important;
    }

    /* Scrollable cart body */
    #sideCart .offcanvas-body {
        overflow-y: auto;
    }


    /* Cart footer (checkout area) */
    #sideCart .offcanvas-footer {
        border-top: 1px solid #eee;
        background: #fff;
    }


    /* =========================================================
    FIXED HEADER / NAVBAR
    ========================================================= */

    /* Prevent horizontal overflow site-wide */
    html, body {
        overflow-x: hidden;
        max-width: 100%;
    }

    .fixed-top-navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1035; /* above content, below offcanvas */
        background-color: #fff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.20);
        /* Prevent iOS Safari URL-bar jump */
        transform: translate3d(0, 0, 0);
        -webkit-transform: translate3d(0, 0, 0);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        -webkit-perspective: 1000;
        perspective: 1000;
        /* Equal top/bottom padding — safe area added on top for notched devices */
        padding-top: calc(8px + env(safe-area-inset-top, 0px));
        padding-bottom: 8px;
    }

    /* =========================================================
    NAVIGATION TYPOGRAPHY & ALIGNMENT
    ========================================================= */

    .nav-links a,
    .nav-dropdown-link {
        font-family: 'Poppins', sans-serif;
        font-size: 0.875rem;     /* same as Bootstrap .small */
        font-weight: 500;        /* same as fw-semibold */
        letter-spacing: 0.5px;
    }

    /* ===== UNIFORM NAV ITEM ALIGNMENT ===== */
    .nav-links {
        display: flex;
        align-items: center;
    }

    .nav-links > a,
    .nav-dropdown {
        display: flex;
        align-items: center;
        height: 40px;   /* SAME HEIGHT FOR ALL */
    }

    /* Normalize vertical alignment */
    .nav-links a {
        line-height: 1;
        padding: 0;
    }

    /* Force consistent nav color */
    .nav-links a,
    .nav-links a:visited {
        color: #111010ff !important;
    }

    /* =========================================================
    NAV UNDERLINE (Hover + Active)
    ========================================================= */

    .nav-links > a,
    .nav-dropdown-link {
        position: relative;
        text-decoration: none;
    }

    /* underline element */
    .nav-links > a::before,
    .nav-dropdown-link::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: +6px;
        width: 0;
        height: 2.5px;
        background-color: #e84914ff;
        transform: translateX(-50%);
        transition: width 0.25s ease;
    }

    /* show underline on hover OR active */
    .nav-links > a:hover::before,
    .nav-links > a.active::before,
    .nav-dropdown:hover .nav-dropdown-link::before,
    .nav-dropdown-link.active::before {
        width: 100%;
    }


    /* =========================================================
    PURE CSS NAV DROPDOWN
    ========================================================= */

    .nav-dropdown {
        position: relative;
    }

    .nav-dropdown-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        background: #ffffffff;
        min-width: 150px;
        padding: 8px 0;
        border-radius: 3px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        z-index: 1000;
    }

    .nav-dropdown:hover .nav-dropdown-menu {
        display: block;
    }

    /* dropdown items */
    .nav-dropdown-menu a {
        display: block;
        padding: 8px 16px;
        color: #000;
        text-decoration: none;
        font-size: 14px;
    }

    .nav-dropdown-menu a:hover {
        background-color: #d4d4d4ff;
    }

    .nav-dropdown-link {
        display: flex;
        align-items: center;
        height: 100%;
    }

    /* =========================================================
    PRODUCT GRID CARDS
    ========================================================= */

    .product-card img {
        aspect-ratio: 3 / 4;
        object-fit: cover;
    }

    .product-card {
        cursor: pointer;
    }

    .product-card:hover {
        transform: translateY(-2px);
        transition: 0.2s ease;
    }


    /* =========================================================
    PRODUCT DETAIL PAGE — SIZE SELECTOR
    ========================================================= */

    /* hide radio button */
    .size-radio {
        display: none;
    }

    /* Size circle UI */
    .size-circle {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1.5px solid #d4d5d9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        background: #fff;
    }

    /* hover effect */
    .size-circle:hover {
        border-color: #000;
    }

    /* selected Size */
    .size-radio:checked + .size-circle {
        border-color: #ff3f6c;
        color: #ff3f6c;
    }

    /* SIZE CIRCLES */
    .size-options {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    /* OUT OF STOCK SIZE */
    .size-disabled {
        border-color: #a70303ff !important;
        color: #000000ff !important;
        background: #f7f7f7;
        cursor: not-allowed;
        position: relative;
    }

    /* Diagonal strike line */
    .size-disabled::after {
        content: "";
        position: absolute;
        width: 70%;
        height: 1.5px;
        background: #aa0404ff;
        transform: rotate(-45deg);
    }

    .wishlist-btn {

        align-items: center;
        justify-content: center;
        font-size: 18px;
    }

    .bi-heart-fill {

    }

    .wishlist-btn i {

    }

    .out-of-stock-text {

        font-weight: 600;

    }

        right: 0;

        letter-spacing: 0.8px;

        padding: 7px 0;
        z-index: 5;
        pointer-events: none;
    }

    /* Mute price text for OOS products */
    .oos-price {

    }

    .notify-btn {
        background-color: #ff3f6c;   /* Myntra-like pink */

        border: none;
    }

    .notify-btn:hover {

    /* Product action buttons same height */
    .product-action-btn {
        height: 42px;              /* same height */
        padding: 0 20px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;

    /* =========================================================
    FILTERS — MYNTRA STYLE (CATEGORY PAGE)
    ========================================================= */

    .sticky-filters {
        position: sticky;
        top: 90px;            /* height of navbar */
        max-height: calc(100vh - 100px);
        overflow-y: auto;
        padding-right: 8px;
        background: #fff;
    }

    /* COMMON FILTER SECTION */
    .filter-section {
        padding-bottom: 16px;
        margin-bottom: 8px;
        border-bottom: 1px solid #f0f0f0;
    }

    /* FILTER TITLE */
    .filter-title {
        font-weight: 700;
        letter-spacing: 1px;
        font-size: 14px;
        margin-bottom: 6px;
    }

    /* FILTER HEADERS (BRAND / SIZE / PRICE) */
    .filter-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
    }

    .filter-search {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #f5f5f6;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    .filter-search i {

        color: #555;
    }

    /* CHECKBOX LIST */
    .filter-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    /* CUSTOM CHECKBOX */
    .filter-checkbox {
        display: flex;
        align-items: center;
        cursor: pointer;
        gap: 10px;
        font-size: 14px;
    }

    .filter-checkbox input {
        display: none;
    }

    .filter-checkbox .checkmark {
        width: 16px;
        height: 16px;
        border: 1px solid #ccc;
        border-radius: 2px;
        position: relative;
    }

    .filter-checkbox input:checked + .checkmark {
        background-color: #ff3f6c;
        border-color: #ff3f6c;
    }

    .filter-checkbox input:checked + .checkmark::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 2.5px;
        width: 4px;
        height: 8px;
        border: solid #fff;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }

    /* LABEL TEXT */
    .label-text {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    /* MORE LINK */
    .filter-more {
        margin-top: 10px;
        font-size: 13px;
        color: #ff3f6c;
        cursor: pointer;
        font-weight: 600;
    }

    /* SIZE CHECKBOX STYLE */
    .size-checkbox .checkmark {
        border-radius: 2px;
    }

    /* FILTERS HEADER ROW */
    .filters-header-row {
        display: flex;
        justify-content: space-between;

        margin-bottom: 12px;
    }

        font-weight: 600;
        color: #ff3f6c;
        text-decoration: none;
        cursor: pointer;
    }

    .clear-all:hover {

    }

    ================================ */

        }

        .selling-price {

        }

            display: none;
        }
    }

        -webkit-transform: translate3d(0, 0, 0);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        -webkit-perspective: 1000;
        perspective: 1000;
    }
    .mob-cat-btn {
        flex: 1;
        background: none;
        border: none;
        font-size: 14px;
        font-weight: 700;
        color: #111;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-family: inherit;
        transition: background .15s;
    }
    .mob-cat-btn:active { background: #f3f4f6; }
    .mob-cat-divider {
        width: 1px;
        background: #e5e7eb;
        margin: 10px 0;
    }

    /* ── Sort bottom sheet options ── */
    .sort-option {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        font-size: 15px;
        font-weight: 500;
        color: #111;
        cursor: pointer;
        border-bottom: 1px solid #f9fafb;
        transition: background .15s;
    }
    .sort-option:hover { background: #fafafa; }
    .sort-option .sort-check { display: none; color: #ff3f6c; font-size: 16px; }
    .sort-option.active { font-weight: 700; color: #ff3f6c; }
    .sort-option.active .sort-check { display: block; }

    /* ════════════════════════════════════════════════════════
       MOBILE FILTER — two-panel layout
       (sidebar tabs + content area)
       ════════════════════════════════════════════════════════ */

    /* Full-width offcanvas on mobile */
    .mf-offcanvas {
        width: 100% !important;
        max-width: 420px;
        display: flex !important;
        flex-direction: column;
        overflow: hidden !important;  /* prevent the offcanvas itself from scrolling */
        height: 100% !important;
    }

    /* Header */
    .mf-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 13px 16px;
        border-bottom: 1px solid #e5e7eb;
        flex-shrink: 0;
    }
    .mf-clear-all {
        font-size: 12px;
        font-weight: 600;
        color: #ff3f6c;
        text-decoration: none;
        letter-spacing: 0.3px;
        margin-left: auto;
    }
    .mf-clear-all:hover { text-decoration: underline; }
    .mf-no-filter-toast {
        background: #333;
        color: #fff;
        font-size: 12px;
        text-align: center;
        padding: 6px 16px;
        border-bottom: 1px solid #444;
    }

    /* ── Unsaved-changes bottom sheet overlay ── */
    .mob-unsaved-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 1060;
        display: flex;
        align-items: flex-end;
        justify-content: center;
    }
    .mob-unsaved-sheet {
        background: #fff;
        border-radius: 20px 20px 0 0;
        padding: 28px 20px 24px;
        width: 100%;
        text-align: center;
        animation: slideUpSheet 0.25s ease;
    }
    @keyframes slideUpSheet {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
    }
    .mob-unsaved-icon {
        font-size: 32px;
        color: #f59e0b;
        margin-bottom: 10px;
    }
    .mob-unsaved-title {
        font-weight: 700;
        font-size: 16px;
        margin-bottom: 8px;
        color: #111;
    }
    .mob-unsaved-msg {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 20px;
        line-height: 1.5;
    }

    /* Body: left sidebar + right content */
    .mf-body {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
    }

    /* ── Left sidebar ── */
    .mf-sidebar {
        width: 34%;
        background: #f7f8fa;
        border-right: 1px solid #e5e7eb;
        overflow-y: auto;
        flex-shrink: 0;
    }

    .mf-tab {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 10px 14px 12px;
        font-size: 13px;
        font-weight: 500;
        color: #374151;
        cursor: pointer;
        border-bottom: 1px solid #e9eaec;
        transition: background .12s, color .12s;
        position: relative;
    }

    .mf-tab:hover { background: #f0f1f3; }

    .mf-tab.active {
        background: #fff;
        color: #ff3f6c;
        font-weight: 700;
        border-left: 3px solid #ff3f6c;
        padding-left: 9px;
    }

    .mf-badge {
        background: #ff3f6c;
        color: #fff;
        font-size: 10px;
        min-width: 16px;
        height: 16px;
        border-radius: 10px;
        padding: 0 4px;
        text-align: center;
        line-height: 16px;
        flex-shrink: 0;
    }

    /* ── Right content panel ── */
    .mf-content {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px;
        min-width: 0;
    }

    .mf-panel { display: none; }
    .mf-panel.active { display: block; }

    /* Brand search input */
    .mf-search {
        width: 100%;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        margin-bottom: 10px;
        outline: none;
        font-family: inherit;
        color: #111;
    }
    .mf-search:focus { border-color: #ff3f6c; box-shadow: 0 0 0 2px rgba(255,63,108,.1); }

    /* Brand option list */
    .mf-options {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .mf-checkbox-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 6px;
        cursor: pointer;
        border-radius: 6px;
        font-size: 13px;
        transition: background .1s;
    }
    .mf-checkbox-item:hover { background: #f5f6f8; }
    .mf-checkbox-item input { display: none; }

    .mf-checkmark {
        width: 16px;
        height: 16px;
        border: 1.5px solid #d1d5db;
        border-radius: 3px;
        position: relative;
        flex-shrink: 0;
        transition: background .15s, border-color .15s;
    }
    .mf-checkbox-item input:checked + .mf-checkmark {
        background: #ff3f6c;
        border-color: #ff3f6c;
    }
    .mf-checkbox-item input:checked + .mf-checkmark::after {
        content: "";
        position: absolute;
        left: 4px; top: 1.5px;
        width: 5px; height: 8px;
        border: solid #fff;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }

    .mf-label { flex: 1; color: #111; }
    .mf-no-result { font-size: 12px; color: #9ca3af; padding: 8px 4px; }

    /* Size pills grid */
    .mf-size-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 4px 0;
    }
    .mf-size-item { cursor: pointer; }
    .mf-size-item input { display: none; }
    .mf-size-pill {
        display: inline-block;
        padding: 7px 14px;
        border: 1.5px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: #374151;
        cursor: pointer;
        transition: all .15s;
        background: #fff;
        user-select: none;
    }
    .mf-size-item input:checked + .mf-size-pill {
        background: #ff3f6c;
        border-color: #ff3f6c;
        color: #fff;
        font-weight: 600;
    }

    /* Price values */
    .mf-price-val {
        font-size: 13px;
        font-weight: 600;
        color: #111;
    }

    /* ── Footer (Apply / Close / Unsaved prompt) ── */
    .mf-footer {
        padding: 14px 16px;
        padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
        border-top: 2px solid #f0f0f0;
        background: #fff;
        flex-shrink: 0;
        box-shadow: 0 -4px 16px rgba(0,0,0,0.10);
        transform: translate3d(0, 0, 0);
        -webkit-transform: translate3d(0, 0, 0);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        -webkit-perspective: 1000;
        perspective: 1000;
    }
    .mf-footer .btn {
        height: 46px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        letter-spacing: 0.3px;
    }
    .mob-filter-prompt { margin-bottom: 10px; }

    /* Fix navbar height */
    .navbar {
        min-height: 64px;
    }

    /* Remove extra padding Bootstrap adds */
    .navbar-brand {
        padding-top: 0;
        padding-bottom: 0;
    }

    /* Control logo size properly */
    .brand-logo {
        max-height: 44px;   /* THIS is the sweet spot */
        width: auto;
        display: block;
        opacity: 0;
        animation: logoFadeIn 0.8s ease forwards;
        transition: transform 0.25s ease, filter 0.25s ease;
        transform: translateY(1px);
    }

    @keyframes logoFadeIn {
        from {
            opacity: 0;
            transform: translateY(4px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .navbar-brand:hover .brand-logo {
        transform: translateY(-2px);
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
    }

    .search-item {
        display: flex;
        gap: 10px;
        padding: 10px;
        cursor: pointer;
    }

    .search-item:hover {
        background: #f5f5f5;
    }

    .search-item img {
        width: 50px;
        height: 65px;
        object-fit: cover;
        border-radius: 6px;
    }

    .search-item-name {
        font-weight: 600;
        font-size: 14px;
    }

    .search-item-meta {
        font-size: 12px;
        color: #777;
    }

    .search-item.active {
        background: #f0f0f0;
    }

    .search-highlight {
        color: #ff3f6c;
        font-weight: 600;
    }

    .search-view-all {
        padding: 10px 12px;
        font-weight: 600;
        font-size: 14px;
        border-top: 1px solid #eee;
        cursor: pointer;
    }

    .search-view-all:hover,
    .search-view-all.active {
        background: #f0f0f0;
    }

    #searchViewAll {
        position: sticky;
        bottom: 0;
        background: #fff;
        z-index: 2;
        border-top: 1px solid #eee;
    }

    /* Brand search animation */
    #brandSearchInput {
        opacity: 0;
        max-height: 0;
        transform: translateY(-6px);
        transition:
            opacity 0.2s ease,
            max-height 0.25s ease,
            transform 0.25s ease;
        overflow: hidden;
    }

    /* Visible state */
    #brandSearchInput.show {
        opacity: 1;
        max-height: 40px; /* enough for input height */
        transform: translateY(0);
    }

    /* Remove focus blue shadow for BRAND search only */
    #brandSearchInput:focus {
        outline: none !important;
        box-shadow: none !important;
        border-color: #ced4da; /* normal border */
    }

    .qty-controls {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .qty-controls .qty-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #ddd;
        background: #fff;
        cursor: pointer;
        font-weight: 600;
    }

    .qty-controls .qty-btn:hover {
        background: #f5f5f5;
    }

    .qty-value {
        min-width: 20px;
        text-align: center;
        font-size: 14px;
    }

    /* =========================================================
    § 18-19  HOME PAGE — CATEGORY CARDS & TRUST ICONS
    ─────────────────────────────────────────────────────────
    .category-card  → MEN / WOMEN / KIDS section link tiles
    .trust-card     → icon + label cards (Free Delivery etc.)
    Both appear below the hero carousel on home.html.
    ========================================================= */

    /* ── Home page sections ── */
    .home-section {
        margin: 28px 0;
    }
    .home-trust-section {
        background: #f7f8fa;
        padding: 28px 0;
        margin: 28px 0;
    }
    .home-newsletter {
        padding-bottom: 20px;
    }
    .home-section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
    }
    .home-section-title {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
        letter-spacing: 0.2px;
    }
    .home-section-link {
        font-size: 13px;
        color: #ff3f6c;
        text-decoration: none;
        font-weight: 500;
    }

    /* ── Category scroll tiles ── */
    .category-scroll-row {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 6px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
    }
    .category-scroll-row::-webkit-scrollbar { display: none; }

    .home-cat-tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 90px;
        flex-shrink: 0;
        padding: 16px 10px;
        border-radius: 16px;
        text-decoration: none;
        transition: transform .15s ease, box-shadow .15s ease;
    }
    .home-cat-tile:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(0,0,0,.12);
    }
    .home-cat-icon { font-size: 26px; line-height: 1; }
    .home-cat-name {
        font-size: 12px;
        font-weight: 700;
        margin-top: 8px;
        letter-spacing: 0.3px;
    }

    /* Tile colors */
    .home-cat-men     { background: #e8edf5; color: #1a2d5a; }
    .home-cat-women   { background: #fce8f0; color: #9b1b53; }
    .home-cat-tshirts { background: #e0f2fe; color: #0369a1; }
    .home-cat-shirts  { background: #e8f5e9; color: #1b5e20; }
    .home-cat-kurtis  { background: #fdf3e7; color: #92400e; }
    .home-cat-jeans   { background: #ede7f6; color: #4527a0; }

    /* Desktop: wrap into rows */
    @media (min-width: 768px) {
        .category-scroll-row {
            flex-wrap: wrap;
            overflow-x: visible;
        }
        .home-cat-tile {
            min-width: calc(16.66% - 10px);
            flex: 1;
        }
    }

    /* ── Trust tiles ── */
    .trust-scroll-row {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 6px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
    }
    .trust-scroll-row::-webkit-scrollbar { display: none; }

    .trust-tile {
        min-width: 130px;
        flex-shrink: 0;
        background: #fff;
        border-radius: 14px;
        padding: 18px 12px;
        text-align: center;
        box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .trust-icon { font-size: 26px; line-height: 1; }
    .trust-label {
        font-size: 13px;
        font-weight: 700;
        margin-top: 8px;
        color: #111;
    }
    .trust-sub {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 3px;
    }

    @media (min-width: 768px) {
        .trust-scroll-row {
            flex-wrap: wrap;
            overflow-x: visible;
        }
        .trust-tile {
            min-width: calc(25% - 10px);
            flex: 1;
        }
    }

    /* ── Newsletter ── */
    .newsletter-form {
        display: flex;
        gap: 8px;
        max-width: 480px;
        margin: 0 auto;
    }
    .newsletter-form input {
        flex: 1;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        outline: none;
        font-family: inherit;
    }
    .newsletter-form input:focus { border-color: #ff3f6c; }
    .newsletter-form .btn { flex-shrink: 0; border-radius: 8px; font-size: 14px; }

    @media (max-width: 480px) {
        .newsletter-form { flex-direction: column; }
        .newsletter-form .btn { width: 100%; }
    }

    /* ── Hero buttons ── */
    .hero-btns { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Keep old category-card/trust-card for backward compat */
    .category-card {
        display: block;
        background: #f5f5f5;
        padding: 40px 20px;
        text-align: center;
        font-weight: 600;
        border-radius: 14px;
        color: #000;
        text-decoration: none;
        transition: transform .15s ease, box-shadow .15s ease;
    }
    .category-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }
    .trust-card {
        background: #fff;
        padding: 25px 15px;
        border-radius: 14px;
        box-shadow: 0 4px 14px rgba(0,0,0,.06);
        font-size: 28px;
    }
    .trust-card h6 {
        font-size: 15px;
        margin-top: 8px;
    }

    /* =========================================================
    § 20  HERO CAROUSEL
    ─────────────────────────────────────────────────────────
    Full-width Bootstrap carousel on home.html.
    Background images are set here as CSS — update URLs when
    hero images change in /static/images/:
      .hero-slide-1 → hero1.jpg
      .hero-slide-2 → hero2.jpg
      .hero-slide-3 → hero3.jpg
    .hero-slide  → 65vh, dark overlay via ::before (rgba 0.45)
    .hero-text   → overlay text block (z-index:3, padded)
    Controls: prev/next arrows fade in on carousel hover.
    Mobile: height drops to 50vh, arrows hidden.
    ========================================================= */

    .hero-carousel {
        margin-bottom: 40px;
    }

    .hero-slide {
        height: 65vh;
        display: flex;
        align-items: center;
        position: relative;
        color: #fff;
    }

    .hero-slide::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.45);
    }

    .hero-slide-1 {
        background: url("/static/images/hero1.jpg") center/cover no-repeat;
    }

    .hero-slide-2 {
        background: url("/static/images/hero2.jpg") center/cover no-repeat;
    }

    .hero-slide-3 {
        background: url("/static/images/hero3.jpg") center/cover no-repeat;
    }

    .hero-text {
        position: relative;
        z-index: 3;
        max-width: 620px;
        padding-left: 40px;
        padding-right: 40px;
    }

    .hero-text h1 {
        font-size: 48px;
        font-weight: 700;
    }

    .hero-text p {
        font-size: 18px;
        margin: 15px 0 25px;
    }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 768px) {
        .hero-slide {
            height: 52vh;
            justify-content: center;
        }

        .hero-text {
            text-align: center;
            padding: 0 24px;
        }

        .hero-btns {
            justify-content: center;
        }

        .hero-text h1 {
            font-size: 24px;
        }

        .hero-text p {
            font-size: 13px;
            margin: 10px 0 18px;
        }

        .hero-text .btn {
            padding: 8px 20px;
            font-size: 13px;
        }
    }

    /* HERO CAROUSEL CONTROLS — FINAL */

    .hero-carousel .carousel-control-prev,
    .hero-carousel .carousel-control-next {
        width: auto;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0;
        transition: opacity 0.25s ease;
        z-index: 2;
    }

    .hero-carousel .carousel-control-prev {
        left: 24px;
    }

    .hero-carousel .carousel-control-next {
        right: 24px;
    }

    .hero-carousel:hover .carousel-control-prev,
    .hero-carousel:hover .carousel-control-next {
        opacity: 1;
    }

    .hero-carousel .carousel-control-prev-icon,
    .hero-carousel .carousel-control-next-icon {
        background-color: rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(0, 0, 0, 0.25);
        border-radius: 50%;
        width: 44px;
        height: 44px;
        background-size: 50% 50%;
    }

    /* Smooth hover feedback */
    .hero-carousel .carousel-control-prev-icon:hover,
    .hero-carousel .carousel-control-next-icon:hover {
        background-color: rgba(0, 0, 0, 0.15);
    }

    .hero-carousel .carousel-control-prev-icon:hover,
    .hero-carousel .carousel-control-next-icon:hover {
        transform: scale(1.05);
    }

    /* Mobile: hide arrows */
    @media (max-width: 768px) {
        .hero-carousel .carousel-control-prev,
        .hero-carousel .carousel-control-next {
            display: none;
        }
    }

    .free-delivery-cart.pending {
        background: #fff0f6;
        color: #c4004b;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 12px;
    }

    .free-delivery-cart.success {
        background: #e9f8f1;
        color: #0f8a5f;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
        animation: popIn 0.25s ease;
    }

    .free-delivery-checkout.pending {
        background: #fafafa;
        color: #b0003a;
        border-left: 3px solid #ff4d88;
        padding: 8px 12px;
        font-size: 13px;
        margin-bottom: 14px;
    }

    .free-delivery-checkout.success {
        background: #f0fbf6;
        color: #0f8a5f;
        border-left: 3px solid #38c793;
        padding: 8px 12px;
        font-size: 13px;
        margin-bottom: 14px;
        font-weight: 600;
        animation: popIn 0.25s ease;
    }

    @keyframes popIn {
        from { transform: scale(0.97); opacity: 0.6; }
        to   { transform: scale(1); opacity: 1; }
    }

    .product-gallery {
        max-width: 450px;
    }

    /* =========================================================
    § 21  PRODUCT DETAIL — IMAGE GALLERY
    ─────────────────────────────────────────────────────────
    Main image and thumbnail strip on product_detail.html.
    .product-image   → 480px tall, object-fit:cover, rounded
    .thumbnail-img   → 70x90px, clicking swaps main image
    .thumbnail-row   → flex row of thumbnails centered below
    Mobile: .product-image → 320px, .thumbnail-img → 55x70px
    ========================================================= */
    /* MAIN PRODUCT IMAGE */
    .product-image {
        width: 100%;
        height: 480px;              /* Fixed height */
        object-fit: cover;         /* Crop nicely */
        border-radius: 10px;
        background: #f5f5f5;
    }


    /* THUMBNAILS */
    .thumbnail-img {
        width: 70px;
        height: 90px;
        object-fit: cover;         /* Crop */
        cursor: pointer;
        border: 1px solid #ddd;
        border-radius: 6px;
        transition: 0.2s;
        background: #f5f5f5;
    }

    .thumbnail-row {
        display: flex;
        gap: 10px;
