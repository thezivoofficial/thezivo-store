<style>
/* =====================================================
   THEZIVO SHARED PAGE STYLES
   ===================================================== */

:root {
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --bg-page: #f8f7f5;
    --color-black: #111;
    --color-muted: #999;
    --color-border: #ececec;
    --radius-card: 16px;
    --radius-btn: 8px;
    --shadow-card: 0 6px 24px rgba(0,0,0,0.06);
}

.page-wrapper {
    background: var(--bg-page);
    min-height: 100vh;
    padding: 48px 0 80px;
    font-family: var(--font-body);
}

.page-heading { margin-bottom: 32px; }
.page-heading h1 {
    font-family: var(--font-display);
    font-size: 2rem; font-weight: 600;
    color: var(--color-black);
    letter-spacing: -0.3px; margin-bottom: 4px;
}
.page-heading p { color: var(--color-muted); font-size: 0.88rem; font-weight: 300; margin: 0; }

.back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.85rem; color: #888; text-decoration: none;
    margin-bottom: 24px; transition: color 0.15s;
}
.back-link:hover { color: var(--color-black); }

.page-card {
    background: #fff; border-radius: var(--radius-card);
    border: 1px solid var(--color-border); overflow: hidden;
    transition: box-shadow 0.2s;
}
.page-card:hover { box-shadow: var(--shadow-card); }
.page-card-body { padding: 24px; }
.page-card-header {
    padding: 16px 24px; border-bottom: 1px solid #f5f5f5;
    font-weight: 600; font-size: 0.9rem; color: var(--color-black);
}

.zivo-label {
    font-size: 0.78rem; font-weight: 600; color: #888;
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 6px; display: block;
}
.zivo-input {
    border: 1.5px solid #e8e8e8; border-radius: var(--radius-btn);
    padding: 11px 14px; font-family: var(--font-body);
    font-size: 0.9rem; color: var(--color-black);
    transition: border-color 0.15s; width: 100%;
}
.zivo-input:focus { border-color: var(--color-black); box-shadow: none; outline: none; }

.btn-zivo-dark {
    background: var(--color-black); color: #fff; border: none;
    padding: 13px 24px; border-radius: var(--radius-btn);
    font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
    cursor: pointer; transition: background 0.15s, transform 0.15s;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; text-decoration: none;
}
.btn-zivo-dark:hover { background: #333; color: #fff; transform: translateY(-1px); }
.btn-zivo-dark:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.btn-zivo-outline {
    background: #fff; color: var(--color-black);
    border: 1.5px solid var(--color-black);
    padding: 11px 24px; border-radius: var(--radius-btn);
    font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
    cursor: pointer; transition: background 0.15s, color 0.15s;
    display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
}
.btn-zivo-outline:hover { background: var(--color-black); color: #fff; }

.status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.72rem; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
}
.status-placed    { background: #e3f2fd; color: #1565c0; }
.status-confirmed { background: #e8f5e9; color: #2e7d32; }
.status-shipped   { background: #fff8e1; color: #e65100; }
.status-delivered { background: #e8f5e9; color: #1b5e20; }
.status-cancelled { background: #fce4ec; color: #c62828; }
.status-paid      { background: #e8f5e9; color: #2e7d32; }
.status-pending   { background: #fff8e1; color: #e65100; }
.status-failed    { background: #fce4ec; color: #c62828; }

.section-label {
    font-size: 0.72rem; font-weight: 700; color: #aaa;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
}

.empty-state { text-align: center; padding: 80px 24px; }
.empty-state-icon { font-size: 3.5rem; opacity: 0.2; margin-bottom: 20px; }
.empty-state h3 { font-family: var(--font-display); font-size: 1.4rem; color: var(--color-black); margin-bottom: 8px; }
.empty-state p { color: var(--color-muted); font-size: 0.88rem; margin-bottom: 24px; }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.3s ease both; }
</style>
