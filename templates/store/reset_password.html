{% extends "store/base.html" %}
{% block title %}Reset Password | TheZivo{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width:420px;">
    <div class="bg-white p-4 rounded shadow-sm">

        <div style="text-align:center; margin-bottom:24px;">
            <div style="font-size:2rem; margin-bottom:8px;">🔑</div>
            <h4 style="font-weight:700; margin-bottom:4px;">Set New Password</h4>
            <p style="font-size:0.85rem; color:#888; margin:0;">
                Choose a strong password for your account.
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2" style="font-size:0.85rem;">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label" style="font-size:0.8rem; font-weight:600; color:#aaa; text-transform:uppercase; letter-spacing:0.5px;">
                    New Password
                </label>
                <div class="position-relative">
                    <input type="password" id="new-password" name="password" class="form-control"
                           placeholder="Min. 6 characters"
                           style="border-color:#e8e8e8; font-size:0.9rem; padding-right:40px;"
                           required>
                    <button type="button" onclick="togglePwd('new-password','eye1')" tabindex="-1"
                        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#6b7280;font-size:1rem;padding:0;">
                        <i id="eye1" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label" style="font-size:0.8rem; font-weight:600; color:#aaa; text-transform:uppercase; letter-spacing:0.5px;">
                    Confirm Password
                </label>
                <div class="position-relative">
                    <input type="password" id="confirm-password" name="confirm_password" class="form-control"
                           placeholder="Repeat password"
                           style="border-color:#e8e8e8; font-size:0.9rem; padding-right:40px;"
                           required>
                    <button type="button" onclick="togglePwd('confirm-password','eye2')" tabindex="-1"
                        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#6b7280;font-size:1rem;padding:0;">
                        <i id="eye2" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100" style="font-weight:600; padding:11px;">
                Reset Password
            </button>
        </form>

    </div>
</div>

<script>
function togglePwd(inputId, eyeId) {
    var inp = document.getElementById(inputId);
    var eye = document.getElementById(eyeId);
    if (inp.type === 'password') { inp.type = 'text'; eye.className = 'bi bi-eye-slash'; }
    else { inp.type = 'password'; eye.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
