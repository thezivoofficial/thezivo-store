{% extends "store/base.html" %}

{% block title %}Login | TheZivo{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 420px;">
    <div class="bg-white p-4 rounded shadow-sm">

        <h4 class="mb-4 text-center">Login</h4>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Phone Number or Email</label>
                <input type="text"
                       name="identifier"
                       class="form-control"
                       placeholder="Phone or email address"
                       autocomplete="off"
                       value="{{ form_data.identifier }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password"
                           id="login-password"
                           name="password"
                           class="form-control"
                           autocomplete="new-password"
                           required>
                    <button type="button" onclick="toggleLoginPwd()" tabindex="-1"
                        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#6b7280;font-size:1rem;padding:0;">
                        <i id="login-pwd-eye" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100">
                Login
            </button>
        </form>

        <div class="text-center mt-3">
            <small>
                Don't have an account?
                <a href="{% url 'signup' %}">Sign up</a>
            </small>
        </div>

    </div>
</div>
<script>
function toggleLoginPwd() {
    const inp = document.getElementById('login-password');
    const eye = document.getElementById('login-pwd-eye');
    if (inp.type === 'password') { inp.type = 'text'; eye.className = 'bi bi-eye-slash'; }
    else { inp.type = 'password'; eye.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
