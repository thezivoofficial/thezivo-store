[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate && python manage.py createcachetable && (python manage.py createsuperuser --noinput || true) && gunicorn Trendza_store.wsgi --workers 2 --bind 0.0.0.0:$PORT"
restartPolicyType = "on_failure"
